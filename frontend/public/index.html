<!DOCTYPE html>
<html lang="pt">
  <head>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;600&display=swap"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="theme-color" content="#10aa62" />
    <meta
      name="viewport"
      content="minimum-scale=1, initial-scale=1, width=device-width, shrink-to-fit=no, user-scalable=no"
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <style>
      :root {
        --bg: #f8fafc;
        --bg-soft: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --line: #e2e8f0;
        --primary: #10aa62;
        --primary-soft: rgba(16, 170, 98, 0.08);
        --primary-soft-strong: rgba(16, 170, 98, 0.14);
        --shadow: 0 20px 60px rgba(16, 170, 98, 0.10);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        overflow: hidden;
      }

      body {
        color: var(--text);
      }

      #splash-screen {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at top left, rgba(16, 170, 98, 0.08), transparent 32%),
          radial-gradient(circle at bottom right, rgba(16, 170, 98, 0.06), transparent 30%),
          linear-gradient(180deg, #ffffff 0%, #f6fdf9 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.5s ease;
      }

      #splash-screen.fade-out {
        opacity: 0;
      }

      #splash-content {
        width: min(92vw, 420px);
        background: rgba(255, 255, 255, 0.90);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(16, 170, 98, 0.12);
        border-radius: 28px;
        box-shadow: var(--shadow);
        padding: 38px 30px 30px;
        text-align: center;
        animation: fadeUp 0.7s ease;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(22px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 7px 12px;
        border-radius: 999px;
        background: var(--primary-soft);
        color: var(--primary);
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 18px;
        border: 1px solid rgba(16, 170, 98, 0.16);
      }

      .loading-title {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: var(--text);
        margin-bottom: 8px;
      }

      .loading-subtitle {
        font-size: 14px;
        font-weight: 400;
        color: var(--muted);
        line-height: 1.6;
        margin-bottom: 28px;
      }

      .modern-loader {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 24px;
      }

      .loader-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--primary);
        box-shadow: 0 0 10px rgba(16, 170, 98, 0.18);
        animation: dot-bounce 1.2s ease-in-out infinite;
      }

      .loader-dot:nth-child(2) {
        animation-delay: 0.15s;
      }

      .loader-dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes dot-bounce {
        0%,
        80%,
        100% {
          transform: scale(0.55);
          opacity: 0.35;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }

      /* Novos estilos da barra circular */
      .circular-progress-container {
        position: relative;
        width: 100px;
        height: 100px;
        margin: 0 auto 10px;
      }

      .circular-progress {
        width: 100%;
        height: 100%;
        transform: rotate(-90deg); /* Começa do topo */
      }

      .circular-progress circle {
        fill: none;
        stroke-width: 6;
        stroke-linecap: round;
      }

      .circular-progress-bg {
        stroke: #edf7f1;
      }

      .circular-progress-value {
        stroke: var(--primary);
        /* Circunferência = 2 * PI * Raio (40) = ~251.2 */
        stroke-dasharray: 251.2;
        stroke-dashoffset: 251.2;
        transition: stroke-dashoffset 0.35s ease;
      }

      .progress-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 16px;
        font-weight: 600;
        font-family: "Roboto Mono", monospace;
        color: #2f6f52;
      }

      .status-message {
        margin-top: 18px;
        min-height: 20px;
        font-size: 13px;
        color: #6b8f7e;
        transition: opacity 0.25s ease;
      }

      @media (max-width: 480px) {
        #splash-content {
          padding: 30px 20px 24px;
          border-radius: 22px;
        }

        .loading-title {
          font-size: 24px;
        }

        .loading-subtitle {
          font-size: 13px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>

    <script>
      if (!crossOriginIsolated) SharedArrayBuffer = ArrayBuffer;
    </script>
  </head>

  <body>
    <div id="splash-screen">
      <div id="splash-content">
        <div class="badge">Inicializando sistema</div>

        <h1 class="loading-title">Carregando</h1>
        <p class="loading-subtitle">
          Aguarde enquanto o ambiente está sendo preparado para você.
        </p>

        <div class="modern-loader">
          <div class="loader-dot"></div>
          <div class="loader-dot"></div>
          <div class="loader-dot"></div>
        </div>

        <div class="circular-progress-container">
          <svg class="circular-progress" viewBox="0 0 100 100">
            <circle class="circular-progress-bg" cx="50" cy="50" r="40"></circle>
            <circle class="circular-progress-value" id="progress-circle" cx="50" cy="50" r="40"></circle>
          </svg>
          <div class="progress-text" id="progress-text">0%</div>
        </div>

        <div class="status-message" id="status-message">Inicializando...</div>
      </div>
    </div>

    <div id="root"></div>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <script>
      let progress = 0;
      const progressCircle = document.getElementById("progress-circle");
      const progressText = document.getElementById("progress-text");
      const statusMessage = document.getElementById("status-message");
      
      // Circunferência do círculo: 2 * PI * r (40) = ~251.2
      const circumference = 251.2;

      const statusMessages = [
        "Inicializando aplicação...",
        "Carregando componentes...",
        "Configurando interface...",
        "Conectando serviços...",
        "Preparando o ambiente...",
        "Finalizando carregamento..."
      ];

      let messageIndex = 0;

      const interval = setInterval(() => {
        if (progress < 25) {
          progress += Math.random() * 4 + 2;
        } else if (progress < 50) {
          progress += Math.random() * 3 + 1;
        } else if (progress < 80) {
          progress += Math.random() * 2 + 0.5;
        } else if (progress < 95) {
          progress += (95 - progress) / 10;
        }

        const currentProgress = Math.min(progress, 100);
        
        // Atualiza a barra circular e o texto
        const offset = circumference - (currentProgress / 100) * circumference;
        progressCircle.style.strokeDashoffset = offset;
        progressText.textContent = Math.floor(currentProgress) + "%";

        const newMessageIndex = Math.floor((currentProgress / 100) * statusMessages.length);
        if (newMessageIndex !== messageIndex && newMessageIndex < statusMessages.length) {
          messageIndex = newMessageIndex;
          statusMessage.style.opacity = "0";

          setTimeout(() => {
            statusMessage.textContent = statusMessages[messageIndex];
            statusMessage.style.opacity = "1";
          }, 180);
        }

        if (progress >= 100) {
          clearInterval(interval);
          statusMessage.textContent = "Abrindo sistema...";

          setTimeout(() => {
            const splashScreen = document.getElementById("splash-screen");
            splashScreen.classList.add("fade-out");

            setTimeout(() => {
              splashScreen.remove();
            }, 700);
          }, 700);
        }
      }, 120);

      window.finishProgress = () => {
        progress = 100;
      };

      window.addEventListener("load", () => {
        setTimeout(() => {
          if (progress < 85) progress = 85;
        }, 700);
      });

      setTimeout(() => {
        if (document.getElementById("splash-screen")) {
          window.finishProgress();
        }
      }, 15000);
    </script>
  </body>
</html>
